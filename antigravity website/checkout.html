<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Secure Checkout - Night Power. Complete your order for specialized health products with Cash on Delivery.">
    <meta name="robots" content="noindex, nofollow">
    <title>Checkout | Night Power Health & Wellness</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="scripts/firebase-config.js"></script>
</head>

<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                NIGHT<span>POWER</span>
            </a>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="cart.html" class="icon-btn">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main style="padding: 60px 0; background: var(--bg-alt); min-height: 80vh;">
        <div class="container">
            <h1 class="section-title">Checkout</h1>

            <div class="grid checkout-grid" style="grid-template-columns: 1.5fr 1fr; gap: 40px; margin-top: 40px;">
                <!-- Checkout Form -->
                <div class="card" style="padding: 40px;">
                    <form id="checkout-form">
                        <h3 style="margin-bottom: 25px;">Shipping Information</h3>
                        <div class="responsive-grid-2" style="margin-bottom: 20px;">
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">First Name
                                    *</label>
                                <input type="text" id="chk-first-name" required
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Last Name *</label>
                                <input type="text" id="chk-last-name" required
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Shipping Address
                                *</label>
                            <input type="text" id="chk-address" required placeholder="House#, Street#, Area"
                                style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                        </div>

                        <div class="responsive-grid-2" style="margin-bottom: 20px;">
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">City *</label>
                                <input type="text" id="chk-city" required
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phone Number
                                    *</label>
                                <input type="tel" id="chk-phone" required placeholder="03xx-xxxxxxx"
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                            </div>
                        </div>

                        <h3 style="margin-top: 40px; margin-bottom: 25px;">Payment Method</h3>
                        <div class="card"
                            style="border: 2px solid var(--accent); background: #fff8f8; padding: 20px; display: flex; align-items: center; gap: 15px;">
                            <input type="radio" checked style="width: 20px; height: 20px;">
                            <div>
                                <h4 style="margin: 0;">Cash on Delivery (COD)</h4>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Pay with cash upon
                                    delivery to your doorstep.</p>
                            </div>
                            <i class="fas fa-money-bill-wave"
                                style="margin-left: auto; font-size: 1.5rem; color: var(--accent);"></i>
                        </div>

                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; margin-top: 40px; padding: 18px;">Place Order (COD)</button>
                    </form>
                </div>

                <!-- Order Summary -->
                <div id="checkout-summary" class="card" style="height: fit-content; position: sticky; top: 120px;">
                    <h3
                        style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                        Your Order</h3>
                    <div id="checkout-items" style="margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
                        <!-- Items will be injected here -->
                    </div>
                    <div class="flex justify-between" style="margin-bottom: 15px;">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">Rs. 0</span>
                    </div>
                    <div class="flex justify-between" style="margin-bottom: 15px;">
                        <span>Shipping</span>
                        <span style="color: var(--success); font-weight: 600;">FREE</span>
                    </div>
                    <div class="flex justify-between"
                        style="margin-bottom: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; font-weight: 800; font-size: 1.25rem;">
                        <span>Total</span>
                        <span id="checkout-total" style="color: var(--accent);">Rs. 0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/products.js"></script>
    <script src="scripts/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/checkout.js"></script>
</body>

</html>
