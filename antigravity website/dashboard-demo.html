<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Dashboard System</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #ef233c;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #e9ecef;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }

        .header-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gray);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        h2,
        h3 {
            margin-bottom: 15px;
            color: var(--dark);
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            background: var(--gray);
        }

        button:hover {
            filter: brightness(0.9);
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.danger {
            background: var(--danger);
            color: white;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Product Cards Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .card {
            background: white;
            border: 1px solid var(--gray);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
        }

        .card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-price {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.2rem;
            margin: 10px 0;
        }

        /* Admin List Row */
        .admin-row {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            border: 1px solid var(--gray);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            background: var(--light);
        }

        .admin-row img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }

        .admin-inputs {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 10px;
        }

        .section-box {
            border: 1px solid var(--gray);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            background: var(--light);
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-tabs">
            <button class="tab-btn active" onclick="switchTab('user')">User Dashboard</button>
            <button class="tab-btn" onclick="switchTab('admin')">Admin Dashboard</button>
        </div>

        <!-- USER DASHBOARD -->
        <div id="userDashboard">
            <div class="section-box">
                <h3>My Profile</h3>
                <div class="form-group">
                    <input type="text" id="username" placeholder="Full Name">
                    <input type="text" id="useremail" placeholder="Email Address">
                    <button class="primary" onclick="saveProfile()" style="height: 40px;">Save settings</button>
                </div>
                <div id="msg"></div>
            </div>

            <div style="margin-bottom: 20px;">
                <button class="primary" onclick="toggleSection('orders')">My Orders</button>
                <button class="primary" onclick="toggleSection('wishlist')">My Wishlist</button>
            </div>

            <div id="ordersSection" class="section-box" style="display:none;">
                <h3>Recent Orders</h3>
                <p style="color: #666;">No orders found.</p>
            </div>

            <div id="wishlistSection" class="section-box" style="display:none;">
                <h3>My Wishlist</h3>
                <div id="wishlistGrid" class="grid"></div>
            </div>

            <h3>Available Products</h3>
            <div id="userProductsGrid" class="grid"></div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="adminDashboard" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Manage Inventory</h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="sortProducts('price')">Sort by Price ($)</button>
                    <button onclick="sortProducts('name')">Sort by Name (A-Z)</button>
                </div>
            </div>

            <div id="adminProductsList"></div>
        </div>
    </div>

    <script>
        // --- DEFAULT DATA & INITIALIZATION ---
        const defaultData = [
            { id: 1, name: "Premium Wireless Headphones", price: 150, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400" },
            { id: 2, name: "Smart Fitness Watch", price: 85, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400" },
            { id: 3, name: "Professional Camera Lens", price: 320, image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=400" }
        ];

        let products = JSON.parse(localStorage.getItem('sys_products'));
        if (!products) {
            products = defaultData;
            localStorage.setItem('sys_products', JSON.stringify(products));
        }

        let wishlist = JSON.parse(localStorage.getItem('sys_wishlist') || '[]');

        // --- TAB & SECTION TOGGLING ---
        function switchTab(tab) {
            document.getElementById('userDashboard').style.display = tab === 'user' ? 'block' : 'none';
            document.getElementById('adminDashboard').style.display = tab === 'admin' ? 'block' : 'none';

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Refresh views to ensure data is synced perfectly
            renderUserProducts();
            renderAdminProducts();
            renderWishlist();
        }

        function toggleSection(sec) {
            const orderSec = document.getElementById('ordersSection');
            const wishSec = document.getElementById('wishlistSection');

            if (sec === 'orders') {
                orderSec.style.display = orderSec.style.display === 'none' ? 'block' : 'none';
                wishSec.style.display = 'none';
            } else {
                wishSec.style.display = wishSec.style.display === 'none' ? 'block' : 'none';
                orderSec.style.display = 'none';
            }
        }

        // --- PROFILE MANAGEMENT ---
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('sys_profile') || '{}');
            if (profile.name) document.getElementById('username').value = profile.name;
            if (profile.email) document.getElementById('useremail').value = profile.email;
        }

        function saveProfile() {
            const name = document.getElementById('username').value.trim();
            const email = document.getElementById('useremail').value.trim();
            const msg = document.getElementById('msg');

            if (!name || !email) {
                msg.textContent = "All fields are required!";
                msg.style.color = "var(--danger)";
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                msg.textContent = "Please enter a valid email address.";
                msg.style.color = "var(--danger)";
                return;
            }

            localStorage.setItem('sys_profile', JSON.stringify({ name, email }));
            msg.textContent = "Profile saved successfully!";
            msg.style.color = "var(--success)";
            setTimeout(() => msg.textContent = "", 3000);
        }

        // --- RENDERING PRODUCTS (USER) ---
        function renderUserProducts() {
            const grid = document.getElementById('userProductsGrid');
            grid.innerHTML = products.map(p => {
                const inWishlist = wishlist.some(w => w.id === p.id);
                return `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <div class="card-body">
                    <h4>${p.name}</h4>
                    <p class="card-price">$${p.price}</p>
                    <button class="${inWishlist ? '' : 'primary'}" onclick="addToWishlist(${p.id})" ${inWishlist ? 'disabled' : ''} style="margin-top:auto">
                        ${inWishlist ? 'Saved in Wishlist' : 'Add to Wishlist'}
                    </button>
                </div>
            </div>`;
            }).join('');
        }

        // --- WISHLIST MANAGEMENT ---
        function renderWishlist() {
            const grid = document.getElementById('wishlistGrid');
            if (wishlist.length === 0) {
                grid.innerHTML = '<p style="color: #666; grid-column: 1/-1;">Your wishlist is empty.</p>';
                return;
            }
            grid.innerHTML = wishlist.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <div class="card-body">
                    <h4>${p.name}</h4>
                    <p class="card-price">$${p.price}</p>
                    <button class="danger" onclick="removeFromWishlist(${p.id})" style="margin-top:auto">Remove Item</button>
                </div>
            </div>`).join('');
        }

        function addToWishlist(id) {
            const product = products.find(p => p.id === id);
            if (product && !wishlist.some(p => p.id === id)) {
                wishlist.push(product);
                localStorage.setItem('sys_wishlist', JSON.stringify(wishlist));
                renderWishlist();
                renderUserProducts(); // Update buttons
            }
        }

        function removeFromWishlist(id) {
            wishlist = wishlist.filter(p => p.id !== id);
            localStorage.setItem('sys_wishlist', JSON.stringify(wishlist));
            renderWishlist();
            renderUserProducts(); // Re-enable Add button
        }

        // --- ADMIN MANAGEMENT ---
        function renderAdminProducts() {
            const list = document.getElementById('adminProductsList');
            list.innerHTML = products.map(p => `
            <div class="admin-row">
                <img src="${p.image}">
                <div class="admin-inputs">
                    <div><label>Product Name</label><input type="text" id="name-${p.id}" value="${p.name}"></div>
                    <div><label>Price ($)</label><input type="number" id="price-${p.id}" value="${p.price}"></div>
                    <div><label>Image URL</label><input type="text" id="img-${p.id}" value="${p.image}"></div>
                </div>
                <button class="primary" onclick="saveAdminProduct(${p.id})" style="margin-top: 25px;">Update</button>
            </div>
        `).join('');
        }

        function saveAdminProduct(id) {
            const index = products.findIndex(p => p.id === id);
            if (index > -1) {
                products[index].name = document.getElementById('name-' + id).value;
                products[index].price = parseFloat(document.getElementById('price-' + id).value) || 0;
                products[index].image = document.getElementById('img-' + id).value;

                // Save to DB
                localStorage.setItem('sys_products', JSON.stringify(products));

                // Sync Wishlist (so wishlist items maintain accurate pricing/images if edited)
                const wishIndex = wishlist.findIndex(w => w.id === id);
                if (wishIndex > -1) {
                    wishlist[wishIndex] = products[index];
                    localStorage.setItem('sys_wishlist', JSON.stringify(wishlist));
                }

                alert("Product successfully updated in database!");

                // Re-render everything
                renderAdminProducts();
                renderUserProducts();
                renderWishlist();
            }
        }

        function sortProducts(type) {
            if (type === 'price') {
                products.sort((a, b) => a.price - b.price);
            } else if (type === 'name') {
                products.sort((a, b) => a.name.localeCompare(b.name));
            }

            localStorage.setItem('sys_products', JSON.stringify(products));
            renderAdminProducts();
            renderUserProducts();
        }

        // INITIAL LOAD EXECUTIONS
        loadProfile();
        renderUserProducts();
        renderWishlist();
        renderAdminProducts();
    </script>

</body>

</html>
